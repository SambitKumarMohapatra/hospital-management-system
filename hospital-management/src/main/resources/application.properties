# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_management
spring.datasource.username=root
spring.datasource.password=Mysql@2002

# JPA/Hibernate - CHANGE THIS LINE ONLY
spring.jpa.hibernate.ddl-auto=update

# Keep the rest of your properties the same
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080

# Static Content Configuration
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Logging
logging.level.com.hospital.hospital_management=DEBUG

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Disable favicon to avoid 500 error
spring.mvc.favicon.enabled=false

# Fix for Content-Type issues
spring.mvc.converters.preferred-json-mapper=jackson