<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Hospital Portal</title>
    <style>
        /* === RESET & BASIC === */
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
            background-image: url('http://localhost:8080/images/hms-background.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            min-height: 100vh;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5);
        }

        /* === NAVBAR === */
        .navbar {
          background-color: rgba(0, 0, 0, 0.7);
          padding: 15px 30px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .navbar h1 {
          font-size: 24px;
          color: #fff;
        }

        .navbar img {
            height: 50px;
            width: auto;
        }

        .navbar button {
          background-color: #00bcd4;
          color: #fff;
          border: none;
          padding: 10px 20px;
          border-radius: 6px;
          cursor: pointer;
          font-weight: bold;
          transition: background-color 0.3s ease;
        }

        .navbar button:hover {
          background-color: #008fa1;
        }

        /* === FOOTER === */
        footer {
          position: absolute;
          bottom: 0;
          width: 100%;
          background-color: rgba(0, 0, 0, 0.6);
          text-align: center;
          padding: 20px 0;
          font-size: 18px;
          color: #e0e0e0;
          text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
        }

        /* === LOGIN MODAL === */
        .modal {
          display: none;
          position: fixed;
          z-index: 10;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          backdrop-filter: blur(5px);
          justify-content: center;
          align-items: center;
        }

        .modal-content {
          background-color: rgba(0, 0, 0, 0.9);
          padding: 30px 40px;
          border-radius: 10px;
          text-align: center;
          width: 90%;
          max-width: 400px;
        }

        .modal-content h2 {
          margin-bottom: 20px;
        }

        .modal-content button {
          display: block;
          width: 100%;
          padding: 12px;
          margin: 10px 0;
          border: none;
          border-radius: 6px;
          font-weight: bold;
          background-color: #00bcd4;
          color: #fff;
          cursor: pointer;
          transition: background-color 0.3s ease;
        }

        .modal-content button:hover {
          background-color: #009eb2;
        }

        .close {
          position: absolute;
          top: 15px;
          right: 25px;
          font-size: 28px;
          color: #fff;
          cursor: pointer;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <img src="images/hms-logo.png" alt="Hospital Logo">
    <h1>Welcome to Hospital Management System</h1>
    <button id="loginBtn">Login</button>
</nav>

<!-- FOOTER -->
<footer>
    Efficiently manage appointments, prescriptions, and billing with secure login for Admins, Doctors, and Patients.
</footer>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2>Login As</h2>
        <button onclick="loginAs('admin')">Admin</button>
        <button onclick="loginAs('doctor')">Doctor</button>
        <button onclick="loginAs('patient')">Patient</button>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
