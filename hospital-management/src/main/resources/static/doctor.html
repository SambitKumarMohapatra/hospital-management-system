<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Doctor Management Dashboard</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Doctor Management</h1>

<!-- Add Doctor Section -->
<section>
    <h2>Add Doctor</h2>
    <form id="add-doctor-form">
        <input type="text" name="name" placeholder="Name" required />
        <input type="text" name="specialization" placeholder="Specialization" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="tel" name="phone" placeholder="Phone" required />
        <button type="submit">Add Doctor</button>
    </form>
    <div id="add-doctor-message" class="message"></div>
</section>

<!-- All Doctors -->
<section>
    <h2>All Doctors</h2>
    <button id="load-doctors">Load Doctors</button>
    <div id="all-doctor-message" class="message"></div>
    <ul id="doctors-list"></ul>
</section>

<!-- Get Doctor By ID -->
<section>
    <h2>Get Doctor By ID</h2>
    <form id="get-doctor-form">
        <input type="number" id="doctor-id" placeholder="Doctor ID" required />
        <button type="submit">Get Doctor</button>
    </form>
    <div id="doctor-details"></div>
    <div id="doctor-message"></div>
</section>

<!-- Update Doctor -->
<section>
    <h2>Update Doctor</h2>
    <form id="update-doctor-form">
        <input type="number" id="update-doctor-id" placeholder="Doctor ID" required/>
        <input type="text" name="name" placeholder="Updated Name" required />
        <input type="text" name="specialization" placeholder="Updated Specialization" required />
        <input type="email" name="email" placeholder="Updated Email" required />
        <input type="tel" name="phone" placeholder="Updated Phone" required />
        <button type="submit">Update Doctor</button>
    </form>
    <div id="update-doctor-message" class="message"></div>
</section>

<!-- Delete Doctor -->
<section>
    <h2>Delete Doctor</h2>
    <form id="delete-doctor-form">
        <input type="number" id="delete-doctor-id" placeholder="Doctor ID" required />
        <button type="submit">Delete Doctor</button>
    </form>
    <div id="delete-doctor-message" class="message"></div>
</section>

<script src="doctor.js"></script>
</body>
</html>
